<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ONIX BRAWL</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Russo+One&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000000;
      --gray: #2a2a2a;
      --gray-dark: #1a1a1a;
      --white: #ffffff;
      --glitch1: #ff003c;
      --glitch2: #00ffe1;
      --glitch3: #ffe600;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Russo One', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 40px;
      overflow-x: hidden;
    }

    /* ── SCANLINE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── NOISE TEXTURE ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.07;
      pointer-events: none;
      z-index: 998;
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: relative;
      margin-bottom: 60px;
      text-align: center;
    }

    .logo {
      font-family: 'Black Ops One', cursive;
      font-size: clamp(72px, 14vw, 160px);
      letter-spacing: 0.04em;
      line-height: 1;
      text-transform: uppercase;
      color: var(--white);
      position: relative;
      display: inline-block;
      animation: glitch-main 2.4s infinite;
    }

    .logo::before,
    .logo::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
      line-height: inherit;
    }

    .logo::before {
      color: var(--glitch1);
      animation: glitch-red 2.4s infinite;
      clip-path: polygon(0 10%, 100% 10%, 100% 40%, 0 40%);
    }

    .logo::after {
      color: var(--glitch2);
      animation: glitch-cyan 2.4s infinite;
      clip-path: polygon(0 55%, 100% 55%, 100% 80%, 0 80%);
    }

    .sub-logo {
      font-family: 'Black Ops One', cursive;
      font-size: clamp(28px, 5vw, 62px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--glitch2);
      position: relative;
      display: block;
      margin-top: -6px;
      animation: glitch-sub 3s infinite;
      text-shadow:
        2px 0 var(--glitch1),
        -2px 0 var(--glitch3);
    }

    /* ── GLITCH KEYFRAMES ── */
    @keyframes glitch-main {
      0%, 90%, 100%  { transform: translate(0,0); }
      92%            { transform: translate(-4px, 2px); }
      94%            { transform: translate(4px,-2px); }
      96%            { transform: translate(-2px, 4px); }
      98%            { transform: translate(3px,-1px); }
    }

    @keyframes glitch-red {
      0%, 89%, 100%  { transform: translate(0,0); opacity: 0; }
      90%            { transform: translate(-6px, 2px); opacity: 0.85; }
      93%            { transform: translate(6px,-2px); opacity: 0.85; }
      96%            { transform: translate(-3px, 3px); opacity: 0.85; }
      99%            { transform: translate(0,0); opacity: 0; }
    }

    @keyframes glitch-cyan {
      0%, 88%, 100%  { transform: translate(0,0); opacity: 0; }
      89%            { transform: translate(6px,-3px); opacity: 0.8; }
      92%            { transform: translate(-6px, 3px); opacity: 0.8; }
      95%            { transform: translate(3px,-2px); opacity: 0.8; }
      98%            { transform: translate(0,0); opacity: 0; }
    }

    @keyframes glitch-sub {
      0%, 85%, 100%  { text-shadow: 2px 0 var(--glitch1), -2px 0 var(--glitch3); transform: skewX(0deg); }
      86%            { text-shadow: -4px 0 var(--glitch1), 4px 0 var(--glitch2); transform: skewX(-4deg); }
      88%            { text-shadow: 4px 0 var(--glitch2), -4px 0 var(--glitch1); transform: skewX(2deg); }
      90%            { text-shadow: 2px 0 var(--glitch1), -2px 0 var(--glitch3); transform: skewX(0deg); }
    }

    /* ── DOWNLOAD GRID ── */
    .download-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      width: 100%;
      max-width: 820px;
      margin-bottom: 44px;
    }

    @media (max-width: 560px) {
      .download-grid { grid-template-columns: 1fr; }
    }

    .dl-card {
      background: var(--gray);
      border-radius: 6px;
      padding: 22px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      border: 1px solid #333;
    }

    .dl-card:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 18px rgba(0,255,225,0.18), 0 0 6px rgba(255,0,60,0.12);
    }

    .dl-card:active { transform: scale(0.98); }

    /* inner darker rectangle */
    .dl-inner {
      background: var(--gray-dark);
      border-radius: 4px;
      width: 90%;
      padding: 14px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid #2f2f2f;
    }

    .dl-label {
      font-family: 'Russo One', sans-serif;
      font-size: clamp(13px, 2.2vw, 17px);
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .dl-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      fill: var(--white);
    }

    /* subtle glitch stripe on hover */
    .dl-card::before {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--glitch2);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .dl-card:hover::before { opacity: 1; top: 0; transition: top 0s, opacity 0.2s; }

    /* ── FOOTER NOTE ── */
    .footer-note {
      font-family: 'Russo One', sans-serif;
      font-size: clamp(10px, 1.8vw, 13px);
      color: var(--white);
      text-align: center;
      max-width: 680px;
      line-height: 1.7;
      opacity: 0.75;
      letter-spacing: 0.03em;
    }

    /* ── FLICKER ANIMATION ── */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.92; }
      52%       { opacity: 0.6; }
      54%       { opacity: 1; }
      80%       { opacity: 1; }
      82%       { opacity: 0.7; }
      84%       { opacity: 1; }
    }
    .logo-wrap { animation: flicker 5s infinite; }

    /* ── DECORATIVE LINE ── */
    .divider {
      width: 100%;
      max-width: 820px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glitch2) 30%, var(--glitch1) 70%, transparent);
      margin-bottom: 40px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

    Safe, Free And enjoy the Brawl Stars mod soon! I'll be creating a Telegram channel for announcements and new script versions
  </p>

</body>
</html>
